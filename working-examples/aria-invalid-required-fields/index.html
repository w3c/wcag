<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input Error Notification with aria-live=assertive and aria-invalid | WCAG 2</title>
<style>
  body{
    background:#fff;
    color:#000;
    font:100% / 1.5 sans-serif;
  }

	:focus-visible{
		outline: 2px solid darkblue;
		outline-offset: 2px;
	}

	label{
		display: block;
		margin-block-end: 0.25em;
		width:max-content;
	}
  
  label.failed {
    border: red thin solid;
    background:#CE0000;
		color:#fff;
  }

	input{
		border:1px solid #000;
		font:inherit;
	}
	
	[type=submit]{
		background: #666;
		color:#fff;
		font:inherit;
		padding:0.25em 0.5em;
	}

	div{
		margin-block:0.5em;
	}

	#errors{
		color:#CE0000;
	}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
	const form = document.getElementById('signup');
	
	form.addEventListener('submit', function(event) {
		event.preventDefault();
		
		const errText = document.getElementById('errors');
		errText.textContent = '';
		
		// Reset all inputs and labels
		document.querySelectorAll('input[type="text"]').forEach(input => {
			input.setAttribute('aria-invalid', 'false');
		});
		document.querySelectorAll('label').forEach(label => {
			label.classList.remove('failed');
		});
		
		const requiredFields = ['first', 'last', 'email'];
		let errorCount = 0;
		
		requiredFields.forEach(fieldId => {
			const field = document.getElementById(fieldId);
			if (field.value.trim() === '') {
				field.setAttribute('aria-invalid', 'true');
				document.querySelector(`label[for='${fieldId}']`).classList.add('failed');
				errorCount++;
			}
		});
		
		if (errorCount > 0) {
			errText.textContent = `Please complete all ${errorCount} required ${errorCount === 1 ? 'field' : 'fields'} and retry`;
		}
	});
});
</script>
</head>
<body>
<h1>Input Error Notification with <code>aria-live=assertive</code> and <code>aria-invalid</code></h1>
<form name="signup" id="signup" method="post" action="">
	<p id="errors" aria-live="assertive"></p>
	<div>
		<label for="first">First Name (required)</label>
		<input aria-invalid="false" autocomplete="given-name" type="text" name="first" id="first">
	</div>
	<div>
		<label for="last">Last Name (required)</label>
		<input aria-invalid="false" autocomplete="family-name" type="text" name="last" id="last">
	</div>
	<div>
		<label for="email">Email (required)</label>
		<input aria-invalid="false" autocomplete="email" type="text" name="email" id="email">
	</div>
	<div>
		<button id="button" type="submit">Sign Up</button>
	</div>
</form>
</body>
</html>
