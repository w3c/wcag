<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>aria-label Example: close button | WCAG 2</title>

    <style>
      body{
        background:#fff;
        color:#000;
        font:100% / 1.5 sans-serif;
      }

      button {
        border: 1px solid #000;
        border-radius: 3px;
        box-shadow: 3px 3px 4px rgba(0, 0, 0, .3);

        &:hover,
        &:focus-visible {
          outline: 1px solid #000;
          box-shadow: 6px 6px 4px rgba(0, 0, 0, .3);
        }
      }

      dialog {
        width: 30%;
        height: 20%;
        padding: 1rem;
        border: 2px solid black;
        background-color: #ddd;
      }

      dialog button {
        float: right;
      }
    </style>

  </head>

  <body>

    <p><button type="button" onclick="document.getElementById('dialog').showModal();">Display the dialog</button></p>

    <dialog id="dialog">
      This is the content of the dialog.
      <button aria-label="Close" onclick="document.getElementById('dialog').close();">&times;</button>
    </dialog>

  </body>

</html>
