<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forms: Using aria-invalid  | WCAG 2</title>
	<style>

	body{
		background:#fff;
		color:#000;
		font:100% / 1.5 sans-serif;
	}

	:focus-visible{
		outline: 2px solid darkblue;
		outline-offset: 2px;
	}
	
	div.control {
	margin-block-start: 1rem;
		label {
			display: block;
			margin: 0;
			padding: 0;
		}
	}

	input, button{
		border:1px solid grey;
		font:inherit;
		padding:0.25em;
	}

	button{
		margin-block-start: 1em;
	}

	.error {
  	border: #CE0000 thin solid;
	}
	
.errtext {
	background: #EEEEFF url('error-icon.svg') no-repeat right 0.25em center;
	color:#CE0000;
	margin-bottom: 1em;
	max-width: fit-content;
	padding: .25em 1.6em .25em .25em;
}

#error-header{
	color:#CE0000;
	font-weight: bold;
}

[hidden]{
	display: none;
}

form{
	border:1px solid;
	margin:0 auto;
	max-width:20rem;
	padding: 1rem;
	& h2{
		margin-block-start:0;
	}
}
</style>
<script src="valcheck.js"></script>
</head>
<body>
<h1>Forms: Using <code>aria-invalid</code> to identify invalid form fields</h1>

<form action="#" method="post" id="login3" novalidate>
	<h2>Log into your account</h2>
	<p hidden id="error-header" tabindex="-1"></p>
	<p>* means required</p>
	<div class="control">
		<label for="pin4">PIN * (4 digits)</label> 
		<input id="pin4" name="pin4" pattern="\d{4}" size="4" type="text">
	</div>
	<div class="control">
		<label for="email">Email address *</label> 
		<input autocomplete="email" id="email" name="email" type="email" >
	</div>
	<div class="control">
		<label for="lname">Last name *</label>
		<input autocomplete="family-name" id="lname" name="lname" pattern="[a-zA-Z]{2,}" type="text">
	</div>
	<div class="control">
		<label for="startDt">Desired policy start date (YYYY-MM-DD)</label>
		<input id="startDt" name="startDt" pattern="20\d{2}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])" type="text">
	</div>
	<button id="next_btn" name="next_btn" type="button">Login</button>
</form>
</body>
</html>
