<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>Example of inputs with simplified accessible names: WCAG 2</title>
<style>

	html{
		background: white;
		color:black;
	}
		body{
			background:#fff;
			color:#000;
			font:100% / 1.5 sans-serif;
		}
		
		input{
			border: 1px solid #0b0c0c;
			font:inherit;
			letter-spacing: inherit;
			word-spacing: inherit;
		}
		input { display: block; }
</style>
</head>
<body>
<label for="name">Name</label> *
<input type="text" name="name" id="name" autocomplete="name" required>
<label for="birth">Birth date</label> (<span id="mask">YYYY-MM-DD</span>)
<input type="text" name="birth" id="birth" autocomplete="bday" aria-describedby="mask">
</body>
</html>
