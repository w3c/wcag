<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Example of SCR22: Using scripts to control blinking and stop it in five seconds or less: WCAG 2</title>
<style>
body{
	background:#fff;
	color:#000;
	font:100% / 1.5 sans-serif;
}
</style>
</head>

<body>

<div id="blink1" class="highlight">New item!</div>
<script>
// blink "on" state
function show()
{
	if (document.getElementById)
	document.getElementById("blink1").style.visibility = "visible";
}
// blink "off" state
function hide()
{
	if (document.getElementById)
	document.getElementById("blink1").style.visibility = "hidden";
}
// toggle "on" and "off" states every 450 ms to achieve a blink effect
// end after 4500 ms (less than five seconds)
for(let i=900; i < 4500; i=i+900)
{
	setTimeout("hide()",i);
	setTimeout("show()",i+450);
}
</script>
</body>
</html>
