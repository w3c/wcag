<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Using aria-alertdialog to Identify Errors | WCAG 2</title>
	<script>
	document.addEventListener('DOMContentLoaded', function() {
		const triggerButton = document.getElementById('trigger-alertdialog');
		const main = document.querySelector('main');
		const modalBackdrop = document.getElementById('modal-backdrop');
		const ariaDialog = document.querySelector('[role="alertdialog"]');
		const dialogButton = ariaDialog.querySelector('button');
		let lastFocus;

		triggerButton.addEventListener('click', function() {
			lastFocus = document.activeElement;
			main.inert = true;
			modalBackdrop.hidden = false;
			ariaDialog.hidden = false;
			dialogButton.focus();
		});

		// Close dialog on button click
		ariaDialog.querySelectorAll('button').forEach(function(button) {
			button.addEventListener('click', function() {
				main.inert = false;
				modalBackdrop.hidden = true;
				ariaDialog.hidden = true;
				lastFocus.focus();
			});
		});
	});
	</script>
	<style>
		body {
			background: #fff;
			color: #000;
			font: 100% / 1.5 sans-serif;
		}

		:focus-visible {
			outline: 2px solid darkblue;
			outline-offset: 2px;
		}

		button {
			background: #666;
			border: 1px solid #000;
			color: #fff;
			font: inherit;
		}

		#modal-backdrop {
			position: fixed;
			inset: 0;
			z-index: 2;
			background-color: #000;
			opacity: 0.5;
		}

		[role=alertdialog] {
			background: #fff;
			border: thin #000 solid;
			box-sizing: border-box;
			height: fit-content;
			inset: 1rem;
			margin: auto;
			max-height: calc(100vh - 2rem);
			max-width: 40rem;
			overflow-y: auto;
			padding: 1rem;
			position: fixed;
			width: calc(100% - 2rem);
			z-index: 3;

			& h1 {
				margin: 0;
			}
		}

		[hidden] {
			display: none;
		}
	</style>
</head>
<body>
	<main>
		<h1>Using <code>aria-alertdialog</code> to Identify Errors</h1>
		<p>This example shows how <code>role="alertdialog"</code> can be used to notify someone they have entered invalid information.</p>
		<button id="trigger-alertdialog" type="button">Trigger Alertdialog</button>
	</main>
	<div id="modal-backdrop" hidden></div>
	<div aria-modal="true" role="alertdialog" aria-labelledby="alert-heading" hidden>
		<h1 id="alert-heading">Error</h1>
		<p>Employee's Birth Date is after their hire date. Please verify the birth date and hire date.</p>
		<button type="button">Return to page and correct error</button>
	</div>
</body>
</html>
