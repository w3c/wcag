<!DOCTYPE html>
<html lang="en">

<head>
	<title>Failure of Success Criterion 1.3.1 for not correctly marking up table headers - example 2 | WCAG 2</title>
	
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
  <style>
    body{
      background:#fff;
      color:#000;
      font:100% / 1.5 sans-serif;
    }

    table{
      border:1px solid;
      border-collapse: collapse;
    }
    
    th, td{
      border:1px solid;
      padding:0.25em;
    }
  </style>


</head>

<body>

<h2>Table using <code>td</code> instead of <code>th</code> for headers</h2>


<table>
   
   <tr>
      <td>Name</td>
      <td>Age</td>
      <td>Height (cm)</td>
      <td>Weight (kg)</td>
   </tr>   
   
   <tr>
      <td scope="row">Linda</td>
      <td>33</th>
      <td>169</th>
      <td>59</th>
   </tr>   
   
   <tr>
      <td scope="row">Jack</td>
      <td>37</td>
      <td>184</td>
      <td>74</td>
   </tr>    
   
   <tr>
      <td scope="row">Kira</td>
      <td>8</td>
      <td>120</td>
      <td>21</td>
   </tr>   
   
   <tr>
      <td scope="row">Daniel</td>
      <td>3</td>
      <td>79</td>
      <td>14</td>
   </tr>
</table>
</body>
</html>
