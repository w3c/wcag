<section id="status-messages" class="sc">
   <h4>Status Messages</h4>
   <p class="conformance-level">AA</p>
   <p>In technologies that support it, <a>status messages</a> that don't receive focus can be <a>programmatically determined</a> so that they can be presented to the user by <a>assistive technologies</a>.</p>
